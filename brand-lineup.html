<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT Brand Lineup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
        }
        .brand-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 2rem 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .brand-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .brand-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 1rem;
            cursor: pointer;
        }
        .brand-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #1a252f 100%);
            color: white;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }
        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .brands-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
                padding: 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SCT Brand Lineup</h1>
        <p>Klik logo untuk kunjungi website principal</p>
        <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem;">← Kembali ke Brochure</a>
    </div>
    
    <div class="brands-grid" id="brandsGrid"></div>

    <script src="data/content-config.js"></script>
    <script>
        const brandsGrid = document.getElementById('brandsGrid');
        const brands = (window.SCTContent && window.SCTContent.get('brands')) || [];
        brandsGrid.innerHTML = brands.map(brand => `
            <div class="brand-item">
                <img src="${brand.img}" alt="${brand.name}" class="brand-img" onclick="window.open('${brand.url}', '_blank')">
                <div class="brand-name">${brand.name}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
