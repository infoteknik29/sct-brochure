<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Service - SCT Brochure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project-colors.css">
    <link rel="stylesheet" href="social.css">
    <style>
        /* Existing perfect circle styles + admin buttons */
        .team-flex-perfect {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .team-card-perfect {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .team-card-perfect:hover {
            transform: scale(1.08) translateY(-20px) rotate(2deg);
            box-shadow: 0 35px 80px rgba(0,0,0,0.4);
        }
        .team-img-perfect {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: transform 0.4s ease;
        }
        .team-card-perfect:hover .team-img-perfect {
            transform: scale(1.1);
        }
        .team-info-perfect {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #ffd700;
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }
        .team-card-perfect:hover .team-info-perfect {
            transform: translateY(0);
        }
        .team-name-perfect { font-size: 1.6rem; font-weight: bold; margin-bottom: 0.3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .team-role-perfect { font-size: 1.1rem; opacity: 0.9; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        @media (max-width: 768px) {
            .team-card-perfect { width: 280px; height: 280px; }
            .team-flex-perfect { gap: 2rem; padding: 1rem; }
        }
        
        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1001;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 350px;
            display: none;
        }
        .admin-toggle {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1002;
            transition: all 0.3s ease;
        }
        .admin-toggle:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(231,76,60,0.4); }
        .admin-btn-small {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .admin-add { background: #27ae60; color: white; }
        .admin-add:hover { background: #229954; }
        .admin-delete { background: #e74c3c; color: white; }
        .admin-delete:hover { background: #c0392b; }
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .admin-form input, .admin-form select { padding: 0.8rem; border: 1px solid #ddd; border-radius: 5px; }
        .superadmin-only { display: none; }
    </style>
</head>
<body class="support-service">
    <nav class="navbar">
        <img src="logo.png" alt="SCT Logo" class="logo-nav">
        <div class="nav-menu">
            <a href="dashboard.html">← Dashboard</a>
            <a href="brand-lineup.html" target="_blank">Brand Lineup</a>
            <a href="product-lineup-fixed.html" target="_blank">Product Lineup</a>
            <a href="gallery.html" target="_blank">Gallery</a>
        </div>
        <div class="nav-right">
            <a href="https://starindocleaning.com/?lang=id" target="_blank" class="btn btn-primary" style="padding:0.5rem 1rem;text-decoration:none;">🌐 Website</a>
        </div>
    </nav>

    <div class="hero-section">
        <video autoplay muted loop class="hero-video">
            <source src="video-bg.mp4" type="video/mp4">
        </video>
        <header class="hero">
            <h1 style="font-size: 4rem; color: white; text-shadow: 3px 3px 6px rgba(0,0,0,0.8);">Support & Service Team</h1>
            <p style="font-size: 1.8rem; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">Meet our dedicated team members</p>
        </header>
    </div>

    <section style="padding: 4rem 2rem;">
        <div class="team-flex-perfect" id="teamContainer">
            <!-- Dynamic team cards loaded from data/team-members.js -->
        </div>
    </section>

    <!-- Modal -->
    <div id="imageModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center;">
        <div class="modal-content" style="position: relative; max-width: 90%; max-height: 90%;">
            <span class="close" onclick="document.getElementById('imageModal').style.display='none'" style="position: absolute; top: -40px; right: 0; color: white; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
            <img id="modalImg" style="max-width: 100%; max-height: 100%; border-radius: 15px;">
            <div id="caption" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 1rem; border-radius: 10px; font-weight: bold;"></div>
        </div>
    </div>

    <script src="data/team-members.js"></script>
    <script src="fixed-script.js"></script>
    <script>
        // Load team
        document.addEventListener('DOMContentLoaded', () => {
            renderTeamMembers();
            document.getElementById('teamCount').textContent = teamMembers.length;
        });

        function renderTeamMembers() {
            const container = document.getElementById('teamContainer');
            container.innerHTML = teamMembers.map(member => `
                <div class="team-card-perfect" onclick="openModal('${member.img}', '${member.name} - ${member.role}')">
                    <img src="${member.img}" alt="${member.name}" class="team-img-perfect">
                    <div class="team-info-perfect">
                        <div class="team-name-perfect">${member.name}</div>
                        <div class="team-role-perfect">${member.role}</div>
                    </div>
                </div>
            `).join('');
        }

        // Admin functions
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function showAddForm() {
            const container = document.getElementById('adminFormContainer');
            container.innerHTML = `
                <div class="admin-form">
                    <input id="newName" placeholder="Name">
                    <input id="newRole" placeholder="Role">
                    <input id="newImg" placeholder="Image path (e.g. Support & Service/Name.png)">
                    <button onclick="addTeamMember()" class="admin-btn-small admin-add">Add</button>
                </div>
            `;
        }

        function showDeleteForm() {
            const container = document.getElementById('adminFormContainer');
            container.innerHTML = `
                <div class="admin-form">
                    <input id="deleteId" placeholder="Member ID or Name">
                    <button onclick="deleteTeamMember()" class="admin-btn-small admin-delete">Delete</button>
                </div>
            `;
        }

        function addTeamMember() {
            const name = document.getElementById('newName').value;
            const role = document.getElementById('newRole').value;
            const img = document.getElementById('newImg').value;
            if (name && role && img) {
                const newMember = {
                    id: teamMembers.length + 1,
                    name,
                    role,
                    img
                };
                teamMembers.push(newMember);
                localStorage.setItem('teamMembers', JSON.stringify(teamMembers));
                renderTeamMembers();
                document.getElementById('teamCount').textContent = teamMembers.length;
                alert('✅ Added!');
            }
        }

        function deleteTeamMember() {
            const search = document.getElementById('deleteId').value;
            const index = teamMembers.findIndex(m => m.id == search || m.name.toLowerCase().includes(search.toLowerCase()));
            if (index > -1) {
                teamMembers.splice(index, 1);
                localStorage.setItem('teamMembers', JSON.stringify(teamMembers));
                renderTeamMembers();
                document.getElementById('teamCount').textContent = teamMembers.length;
                alert('✅ Deleted!');
            } else {
                alert('❌ Not found!');
            }
        }

        function exportTeamData() {
            const dataStr = JSON.stringify(teamMembers, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'team-members-backup.json';
            link.click();
        }

        function importTeamData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    teamMembers = JSON.parse(event.target.result);
                    localStorage.setItem('teamMembers', JSON.stringify(teamMembers));
                    renderTeamMembers();
                    document.getElementById('teamCount').textContent = teamMembers.length;
                    alert('✅ Imported!');
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Modal
        function openModal(img, caption) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImg').src = img;
            document.getElementById('caption').textContent = caption;
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
